<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Жим">
<meta name="theme-color" content="#1B3A6B">
<title>Жим лежачи</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F2F4F8;color:#111;padding-bottom:70px}
.hdr{background:#1B3A6B;color:#fff;padding:16px;position:sticky;top:0;z-index:10}
.hdr h1{font-size:18px;font-weight:700}
.hdr p{font-size:11px;opacity:.75;margin-top:2px}
.body{padding:14px}
.sec{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
.pg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pg{border-radius:14px;padding:12px;border:3px solid transparent;cursor:pointer}
.pg.a{background:#D6E4F7}.pg.b{background:#D4EDE0}.pg.c{background:#F5E0C4}
.pg.sel.a{border-color:#1B3A6B}.pg.sel.b{border-color:#1A5C38}.pg.sel.c{border-color:#7B3F00}
.pg h3{font-size:13px;font-weight:700;margin-bottom:2px}
.pg p{font-size:11px;color:#666}
.row-scroll{display:flex;gap:7px;overflow-x:auto;padding:2px 0 6px;-webkit-overflow-scrolling:touch}
.row-scroll::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;background:#E0E4EC;color:#555;border:none;cursor:pointer}
.chip.sel{background:#1B3A6B;color:#fff}
.chip.done{background:#D4EDE0;color:#1A5C38}
.chip.sel.done{background:#1A5C38;color:#fff}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px}
.card.accent{border-left:4px solid #1B3A6B}
.card h2{font-size:14px;font-weight:700;margin-bottom:3px}
.card .sub{font-size:12px;color:#666;margin-bottom:10px}
.nums{display:flex;gap:20px}
.nv{font-size:22px;font-weight:800;color:#1B3A6B}
.nl{font-size:10px;color:#666;margin-top:2px}
.btn{display:block;width:100%;padding:14px;border-radius:13px;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;text-align:center}
.btn-p{background:#1B3A6B;color:#fff}
.btn-s{background:#E0E4EC;color:#111}
.btn:active{opacity:.8}
.pbwrap{margin-bottom:14px}
.pblbl{display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:5px}
.pb{height:6px;background:#E0E4EC;border-radius:3px;overflow:hidden}
.pbf{height:100%;background:#1A5C38;border-radius:3px;transition:width .3s}
.excard{background:#fff;border-radius:14px;margin-bottom:10px;overflow:hidden}
.exhdr{padding:11px 14px;font-size:14px;font-weight:700;border-bottom:1px solid #E0E4EC;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bdg{font-size:11px;font-weight:600;padding:3px 8px;border-radius:8px}
.bdg-w{background:#FFF3CD;color:#856404}
.bdg-b{background:#D6E4F7;color:#1B3A6B}
.setrow{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #E0E4EC;gap:10px;min-height:52px}
.setrow:last-child{border-bottom:none}
.setrow.rm{background:#FFFBF0}
.setrow.wk{background:#F5F8FF}
.setrow.ap{background:#F0FBF4}
.setrow.done-row{opacity:.4}
.sn{width:20px;font-size:13px;color:#888;font-weight:600;flex-shrink:0}
.st{font-size:12px;color:#888;width:52px;flex-shrink:0}
.sw{font-size:15px;font-weight:700;flex:1}
.sr{font-size:12px;color:#888;flex-shrink:0}
.ckbtn{width:44px;height:44px;min-width:44px;border-radius:50%;border:2.5px solid #ccc;background:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:20px;-webkit-appearance:none;flex-shrink:0;touch-action:manipulation;
  -webkit-user-select:none;user-select:none}
.ckbtn.on{background:#1A5C38;border-color:#1A5C38;color:#fff}
.accard{background:#F8F9FC;border-radius:12px;margin-bottom:10px;overflow:hidden;border:1px solid #E0E4EC}
.achdr{padding:10px 13px;font-size:12px;font-weight:700;color:#666;border-bottom:1px solid #E0E4EC}
.acrow{display:flex;align-items:center;padding:10px 13px;border-bottom:1px solid #E0E4EC;gap:10px}
.acrow:last-child{border-bottom:none}
.acn{font-size:13px;font-weight:600;flex:1}
.acd{font-size:12px;color:#666;text-align:right;line-height:1.5}
.tmrbar{background:#1A5C38;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px;border-radius:12px}
.tmrt{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;flex:1}
.tmrbtn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E0E4EC;display:flex;z-index:10}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;gap:2px;font-size:10px;color:#888;border:none;background:none;cursor:pointer}
.nb.on{color:#1B3A6B}
.ni{font-size:22px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:#fff;border-radius:12px;padding:12px;text-align:center}
.sv{font-size:22px;font-weight:800;color:#1B3A6B}
.sl{font-size:10px;color:#666;margin-top:2px}
.hiitem{background:#fff;border-radius:12px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.hidot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.hidot.ok{background:#1A5C38}.hidot.pt{background:#FFC107}
.hidate{font-size:11px;color:#888}
.scr{display:none}
.scr.on{display:block}
</style>
</head>
<body>

<!-- SCREEN 0: HOME -->
<div id="s0" class="scr on">
  <div class="hdr"><h1>&#128170; Жим лежачи</h1><p>Оберіть програму</p></div>
  <div class="body">
    <div id="tmrHome"></div>
    <div class="sec">Програма</div>
    <div class="pg-grid" id="pgGrid"></div>
    <div class="sec">Хвиля</div>
    <div class="row-scroll" id="wvRow"></div>
    <div class="sec">Тренування</div>
    <div class="row-scroll" id="ssRow"></div>
    <div id="prevCard"></div>
    <button class="btn btn-p" id="startBtn" onclick="goTrain()">Розпочати тренування &#8594;</button>
  </div>
</div>

<!-- SCREEN 1: TRAIN -->
<div id="s1" class="scr">
  <div class="hdr" id="tHdr"><h1 id="tTit"></h1><p id="tSub"></p></div>
  <div class="body">
    <div id="tmrTrain"></div>
    <div id="tBody"></div>
  </div>
</div>

<!-- SCREEN 2: HISTORY -->
<div id="s2" class="scr">
  <div class="hdr"><h1>&#128202; Прогрес</h1><p>Виконані тренування</p></div>
  <div class="body" id="hBody"></div>
</div>

<nav class="nav">
  <button class="nb on" id="n0" onclick="goScr(0)"><span class="ni">&#127968;</span>Головна</button>
  <button class="nb" id="n1" onclick="goScr(1)"><span class="ni">&#127947;</span>Тренування</button>
  <button class="nb" id="n2" onclick="goScr(2)"><span class="ni">&#128202;</span>Прогрес</button>
</nav>

<script>
// ── UTILS ─────────────────────────────────────────────────────────────────────
function r5(w){return Math.round(w/5)*5}
function fw(w){return w+' кг'}
function ge(id){return document.getElementById(id)}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
var _ac=null;
function initAudio(){if(!_ac)try{_ac=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function beep(){
  if(!_ac)return;
  try{
    [0,0.3,0.6].forEach(function(d){
      var o=_ac.createOscillator(),g=_ac.createGain();
      o.connect(g);g.connect(_ac.destination);
      o.frequency.value=880;o.type='sine';
      var t=_ac.currentTime+d;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.4,t+0.02);
      g.gain.linearRampToValueAtTime(0,t+0.2);
      o.start(t);o.stop(t+0.2);
    });
  }catch(e){}
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
var _ti=null, _ts=0;

function timerHTML(){
  if(!_ti)return '';
  var m=Math.floor(_ts/60),s=_ts%60;
  var str=m+':'+(s<10?'0':'')+s;
  return '<div class="tmrbar"><div class="tmrt">'+str+'</div><button class="tmrbtn" onclick="stopTimer()">Готовий &#10003;</button></div>';
}

function startTimer(secs){
  stopTimer();
  _ts=secs;
  _ti=setInterval(function(){
    _ts--;
    if(_ts<=0){
      stopTimer();
      beep();
      try{navigator.vibrate&&navigator.vibrate([300,100,300,100,300])}catch(e){}
    }
    renderTimers();
  },1000);
  renderTimers();
}

function stopTimer(){
  if(_ti){clearInterval(_ti);_ti=null;}
  renderTimers();
}

function renderTimers(){
  var h=timerHTML();
  ge('tmrHome').innerHTML=h;
  ge('tmrTrain').innerHTML=h;
  // re-attach onclick after innerHTML change
  ['tmrHome','tmrTrain'].forEach(function(id){
    var btn=ge(id).querySelector('.tmrbtn');
    if(btn)btn.onclick=stopTimer;
  });
}

// ── WARMUP ────────────────────────────────────────────────────────────────────
function wu(t){
  var s=[{w:20,r:10}];
  if(t<=60){s.push({w:r5(t*0.65),r:6})}
  else if(t<=80){s.push({w:r5(t*0.55),r:6});s.push({w:r5(t*0.75),r:4})}
  else if(t<=95){s.push({w:r5(t*0.50),r:6});s.push({w:r5(t*0.65),r:4});s.push({w:r5(t*0.82),r:2})}
  else{s.push({w:r5(t*0.50),r:5});s.push({w:r5(t*0.65),r:3});s.push({w:r5(t*0.80),r:2});s.push({w:r5(t*0.92),r:1})}
  return s;
}

// ── ACCESSORIES ───────────────────────────────────────────────────────────────
function accList(pi,wn,sn,mW){
  var b=pi===2?125:100;
  if(sn<=2)return[
    {n:'Жим похилий',d:fw(r5(b*(0.54+(wn-1)*0.02)))+' 4x10 / 2 хв'},
    {n:'Тяга в нахилі',d:fw(r5(b*(0.30+(wn-1)*0.02)))+' 4x10 / 2 хв'},
    {n:'Підйом на біцепс',d:fw(r5(b*0.18))+' 3x12 / 90 с'}];
  if(sn<=4)return[
    {n:'Жим вузьким хватом',d:fw(r5(mW*0.78))+' 4x8 / 2-3 хв'},
    {n:'Жим стоячи (ОНР)',d:fw(r5(b*(0.37+(wn-1)*0.015)))+' 3x8 / 2 хв'},
    {n:'Французький жим',d:fw(r5(b*(0.22+(wn-1)*0.02)))+' 3x12 / 90 с'}];
  if(sn<=6)return[
    {n:'Жим вузьким хватом',d:fw(r5(mW*0.78))+' 3x6 / 3 хв'},
    {n:'Підтягування',d:'власна вага 4x6-8 / 2 хв'}];
  if(sn<=8)return[{n:'Жим вузьким хватом',d:fw(r5(mW*0.78))+' 3x4 / 3 хв'}];
  return[{n:'Підтягування (легко)',d:'власна вага 4x5 / 2 хв'}];
}

// ── PROGRAM DATA ──────────────────────────────────────────────────────────────
var P5B=[100,105,110,115,120,125];
var P5D=[
  {pct:0.60,sets:4,reps:10,rest:180,lbl:"Об'єм (60%)",aps:false},
  {pct:0.70,sets:5,reps:8, rest:180,lbl:"Гіпертрофія (70%)",aps:false},
  {pct:0.80,sets:6,reps:6, rest:210,lbl:"Сила-об'єм (80%)",aps:false},
  {pct:0.90,sets:5,reps:4, rest:270,lbl:"Сила (90%)",aps:true},
  {pct:1.00,sets:0,reps:2, rest:330,lbl:"Пік (100%)",aps:true}
];
function p5sets(wn){return wn<=2?3:wn<=4?4:5}

var P9A=[100,105,110,115], P9B=[125,130,135,140];
var P9D=[
  {sets:3,reps:10,rest:150,lbl:"Об'єм (60%)",aps:false},
  {sets:4,reps:10,rest:150,lbl:"Об'єм (65%)",aps:false},
  {sets:4,reps:8, rest:180,lbl:"Гіпертрофія (70%)",aps:false},
  {sets:5,reps:8, rest:180,lbl:"Гіпертрофія+ (75%)",aps:false},
  {sets:5,reps:6, rest:210,lbl:"Сила-об'єм (80%)",aps:false},
  {sets:6,reps:6, rest:210,lbl:"Сила-вит. (85%)",aps:false},
  {sets:5,reps:4, rest:270,lbl:"Сила (90%)",aps:true},
  {sets:4,reps:4, rest:300,lbl:"Сила+ (95%)",aps:true},
  {sets:0,reps:2, rest:330,lbl:"Пік (100%)",aps:true}
];
function p9sets(wn){return wn===1?3:wn<=3?4:5}

var PROGS=[
  {name:'5-сесійна',sub:'ПМ 100 кг',cls:'a',col:'#1B3A6B',waves:6,sessions:5,
   gW:function(wn,sn){return r5(P5B[wn-1]*P5D[sn-1].pct)},
   gD:function(sn){return P5D[sn-1]},
   gS:function(wn,sn){return sn===5?p5sets(wn):P5D[sn-1].sets},
   wL:function(wn){return 'Хвиля '+wn+' \xb7 '+P5B[wn-1]+' \u043a\u0433'},
   sL:function(sn){return '\u04161'+sn+': '+P5D[sn-1].lbl}},
  {name:'9-сесійна А',sub:'ПМ 100 кг',cls:'b',col:'#1A5C38',waves:4,sessions:9,
   gW:function(wn,sn){return P9A[wn-1]-(9-sn)*5},
   gD:function(sn){return P9D[sn-1]},
   gS:function(wn,sn){return sn===9?p9sets(wn):P9D[sn-1].sets},
   wL:function(wn){return 'Хвиля '+wn+' \xb7 '+P9A[wn-1]+' \u043a\u0433'},
   sL:function(sn){return '\u04162'+sn+': '+P9D[sn-1].lbl}},
  {name:'9-сесійна Б',sub:'ПМ 125 кг',cls:'c',col:'#7B3F00',waves:4,sessions:9,
   gW:function(wn,sn){return P9B[wn-1]-(9-sn)*5},
   gD:function(sn){return P9D[sn-1]},
   gS:function(wn,sn){return sn===9?p9sets(wn):P9D[sn-1].sets},
   wL:function(wn){return 'Хвиля '+wn+' \xb7 '+P9B[wn-1]+' \u043a\u0433'},
   sL:function(sn){return '\u04163'+sn+': '+P9D[sn-1].lbl}}
];

// Fix label functions to use correct prefix
PROGS[0].sL=function(sn){return 'С'+sn+': '+P5D[sn-1].lbl};
PROGS[1].sL=function(sn){return 'Т'+sn+': '+P9D[sn-1].lbl};
PROGS[2].sL=function(sn){return 'Т'+sn+': '+P9D[sn-1].lbl};
PROGS[0].wL=function(wn){return 'Хвиля '+wn+' · '+P5B[wn-1]+' кг'};
PROGS[1].wL=function(wn){return 'Хвиля '+wn+' · '+P9A[wn-1]+' кг'};
PROGS[2].wL=function(wn){return 'Хвиля '+wn+' · '+P9B[wn-1]+' кг'};

// ── STATE ─────────────────────────────────────────────────────────────────────
var ST={pi:0,wv:1,ss:1,ck:{},hist:[]};try{var _sv=localStorage.getItem("bench_v1");if(_sv){var _d=JSON.parse(_sv);ST.pi=_d.pi||0;ST.wv=_d.wv||1;ST.ss=_d.ss||1;ST.ck=_d.ck||{};ST.hist=_d.hist||[];}}catch(e){}
function save(){try{localStorage.setItem("bench_v1",JSON.stringify({pi:ST.pi,wv:ST.wv,ss:ST.ss,ck:ST.ck,hist:ST.hist}))}catch(e){}}
var CUR=null;

function cp(){return PROGS[ST.pi]}
function isDone(w,s){return !!ST.ck[ST.pi+'_'+w+'_'+s]}
function isWaveDone(w){var p=cp();for(var i=1;i<=p.sessions;i++)if(!isDone(w,i))return false;return true}

// ── HOME SCREEN ───────────────────────────────────────────────────────────────
function renderHome(){
  renderPG();
  renderWV();
  renderSS();
  renderPrev();
}

function renderPG(){
  var h='';
  PROGS.forEach(function(p,i){
    h+='<div class="pg '+p.cls+(ST.pi===i?' sel':'')+'" onclick="selProg('+i+')"><h3>'+p.name+'</h3><p>'+p.sub+'</p></div>';
  });
  ge('pgGrid').innerHTML=h;
}

function renderWV(){
  var p=cp(),h='';
  for(var w=1;w<=p.waves;w++){
    var cls='chip'+(ST.wv===w?' sel':'')+(isWaveDone(w)?' done':'');
    h+='<button class="'+cls+'" onclick="selWave('+w+')">'+(isWaveDone(w)?'✓ ':'')+'Хв.'+w+'</button>';
  }
  ge('wvRow').innerHTML=h;
}

function renderSS(){
  var p=cp(),h='';
  for(var s=1;s<=p.sessions;s++){
    var lb=ST.pi===0?'С'+s:'Т'+s;
    var cls='chip'+(ST.ss===s?' sel':'')+(isDone(ST.wv,s)?' done':'');
    h+='<button class="'+cls+'" onclick="selSess('+s+')">'+(isDone(ST.wv,s)?'✓ ':'')+lb+'</button>';
  }
  ge('ssRow').innerHTML=h;
}

function renderPrev(){
  var p=cp(),mW=p.gW(ST.wv,ST.ss),sets=p.gS(ST.wv,ST.ss),def=p.gD(ST.ss);
  var pct=Math.round(def.pct*100),d=isDone(ST.wv,ST.ss);
  ge('prevCard').innerHTML=
    '<div class="card accent" style="border-left-color:'+p.col+'">'+
    '<h2>'+p.sL(ST.ss)+'</h2>'+
    '<div class="sub">'+p.wL(ST.wv)+'</div>'+
    '<div class="nums">'+
    '<div><div class="nv" style="color:'+p.col+'">'+fw(mW)+'</div><div class="nl">Вага</div></div>'+
    '<div><div class="nv" style="color:'+p.col+'">'+sets+'×'+def.reps+'</div><div class="nl">Підх×Повт</div></div>'+
    '<div><div class="nv" style="color:'+p.col+'">'+pct+'%</div><div class="nl">Від ПМ</div></div>'+
    '</div>'+(d?'<div style="margin-top:8px;font-size:13px;color:#1A5C38;font-weight:700">✓ Виконано</div>':'')+
    '</div>';
  ge('startBtn').style.background=p.col;
}

function selProg(i){ST.pi=i;ST.wv=1;ST.ss=1;save();renderHome()}
function selWave(w){ST.wv=w;ST.ss=1;save();renderWV();renderSS();renderPrev()}
function selSess(s){ST.ss=s;save();renderSS();renderPrev()}

// ── TRAINING ──────────────────────────────────────────────────────────────────
function goTrain(){
  initAudio();
  var p=cp(),mW=p.gW(ST.wv,ST.ss),sets=p.gS(ST.wv,ST.ss),def=p.gD(ST.ss);
  var wuSets=wu(mW),wkSets=[];
  for(var i=0;i<sets;i++)wkSets.push({w:mW,r:def.reps});
  CUR={pi:ST.pi,wv:ST.wv,ss:ST.ss,mW:mW,def:def,wuS:wuSets,wkS:wkSets,aw:15,wuC:[],wkC:[],apC:[]};
  var px='c'+CUR.pi+'_'+CUR.wv+'_'+CUR.ss+'_';
  for(var i=0;i<wuSets.length;i++)CUR.wuC.push(!!ST.ck[px+'u'+i]);
  for(var i=0;i<wkSets.length;i++)CUR.wkC.push(!!ST.ck[px+'k'+i]);
  for(var i=0;i<wkSets.length;i++)CUR.apC.push(!!ST.ck[px+'a'+i]);
  renderTrain();
  goScr(1);
}

function renderTrain(){
  if(!CUR)return;
  var p=PROGS[CUR.pi],def=CUR.def,col=p.col;
  ge('tTit').textContent=(CUR.pi===0?'С':'Т')+CUR.ss+' — '+def.lbl;
  ge('tSub').textContent=p.wL(CUR.wv)+' · '+fw(CUR.mW);
  ge('tHdr').style.background=col;

  var dn=CUR.wkC.filter(function(v){return v}).length;
  var tot=CUR.wkS.length;
  var pct=tot?Math.round(dn/tot*100):0;

  var h='<div class="pbwrap"><div class="pblbl"><span>Робочі підходи</span><span>'+dn+'/'+tot+'</span></div><div class="pb"><div class="pbf" style="width:'+pct+'%"></div></div></div>';

  // Warmup
  h+='<div class="excard"><div class="exhdr">Розминка <span class="bdg bdg-w">'+CUR.wuS.length+' підх. · 60 с</span></div>';
  CUR.wuS.forEach(function(s,i){
    var c=CUR.wuC[i];
    h+='<div class="setrow rm'+(c?' done-row':'')+'">'+
      '<span class="sn">'+(i+1)+'</span>'+
      '<span class="st" style="color:#856404">Розм.</span>'+
      '<span class="sw">'+fw(s.w)+'</span>'+
      '<span class="sr">'+s.r+' пов.</span>'+
      '<button class="ckbtn'+(c?' on':'')+'" onclick="toggle(\'wu\','+i+',60)">'+
      (c?'&#10003;':'')+'</button></div>';
  });
  h+='</div>';

  // Work sets
  var rm=Math.floor(def.rest/60);
  if(def.aps){
    h+='<div class="excard"><div class="exhdr">Жим лежачи <span class="bdg bdg-b">'+tot+'×'+def.reps+' @ '+fw(CUR.mW)+'</span></div>';
    h+='<div style="background:#F0FBF4;margin:0 12px 12px;border-radius:10px;padding:10px">';
    h+='<div style="font-size:12px;font-weight:700;color:#1A5C38;margin-bottom:8px">APS між підходами — Row/Pulldown @ '+fw(CUR.aw)+'</div>';
    CUR.wkS.forEach(function(s,i){
      var ck=CUR.wkC[i],ca=CUR.apC[i];
      h+='<div class="setrow wk'+(ck?' done-row':'')+'" style="border-radius:8px;margin-bottom:4px;border:none">'+
        '<span class="sn">'+(i+1)+'</span>'+
        '<span class="st" style="color:'+col+';font-weight:700">Жим</span>'+
        '<span class="sw" style="color:'+col+'">'+fw(s.w)+'</span>'+
        '<span class="sr">'+s.r+' пов.</span>'+
        '<button class="ckbtn'+(ck?' on':'')+'" onclick="toggle(\'wk\','+i+','+def.rest+')">'+
        (ck?'&#10003;':'')+'</button></div>';
      if(i<CUR.wkS.length-1){
        h+='<div class="setrow ap'+(ca?' done-row':'')+'" style="border-radius:8px;margin-bottom:4px;border:none;background:#E8F5E9">'+
          '<span class="sn">&nbsp;</span>'+
          '<span class="st" style="color:#1A5C38">APS</span>'+
          '<span class="sw" style="color:#1A5C38">'+fw(CUR.aw)+'</span>'+
          '<span class="sr">6-8 пов.</span>'+
          '<button class="ckbtn'+(ca?' on':'')+'" onclick="toggle(\'ap\','+i+',90)">'+
          (ca?'&#10003;':'')+'</button></div>';
      }
    });
    h+='</div></div>';
  } else {
    h+='<div class="excard"><div class="exhdr">Жим лежачи <span class="bdg bdg-b">'+tot+'×'+def.reps+' @ '+fw(CUR.mW)+'</span>&nbsp;<span class="bdg" style="background:#eee;color:#555">'+rm+' хв</span></div>';
    CUR.wkS.forEach(function(s,i){
      var c=CUR.wkC[i];
      h+='<div class="setrow wk'+(c?' done-row':'')+'">'+
        '<span class="sn">'+(i+1)+'</span>'+
        '<span class="st" style="color:'+col+';font-weight:700">Роб.</span>'+
        '<span class="sw" style="color:'+col+'">'+fw(s.w)+'</span>'+
        '<span class="sr">'+s.r+' пов.</span>'+
        '<button class="ckbtn'+(c?' on':'')+'" onclick="toggle(\'wk\','+i+','+def.rest+')">'+
        (c?'&#10003;':'')+'</button></div>';
    });
    h+='</div>';
  }

  // Accessories
  var ax=accList(CUR.pi,CUR.wv,CUR.ss,CUR.mW);
  if(ax.length){
    h+='<div class="accard"><div class="achdr">Допоміжні вправи — після жиму</div>';
    ax.forEach(function(a){
      h+='<div class="acrow"><div class="acn">'+a.n+'</div><div class="acd">'+a.d+'</div></div>';
    });
    h+='</div>';
  }

  h+='<button class="btn btn-p" style="background:'+col+'" onclick="finSess()">Завершити &#10003;</button>';
  h+='<button class="btn btn-s" onclick="goScr(0)">&#8592; Назад</button>';

  ge('tBody').innerHTML=h;
}

// Global toggle function — called from onclick in HTML
function toggle(type,idx,rest){
  if(!CUR)return;
  var px='c'+CUR.pi+'_'+CUR.wv+'_'+CUR.ss+'_';
  var wasOn;
  if(type==='wu'){wasOn=CUR.wuC[idx];CUR.wuC[idx]=!wasOn;ST.ck[px+'u'+idx]=CUR.wuC[idx]}
  else if(type==='wk'){wasOn=CUR.wkC[idx];CUR.wkC[idx]=!wasOn;ST.ck[px+'k'+idx]=CUR.wkC[idx]}
  else if(type==='ap'){wasOn=CUR.apC[idx];CUR.apC[idx]=!wasOn;ST.ck[px+'a'+idx]=CUR.apC[idx]}
  if(!wasOn)startTimer(rest);save();
  renderTrain();
}

function finSess(){
  if(!CUR)return;
  var dn=CUR.wkC.filter(function(v){return v}).length;
  ST.ck[CUR.pi+'_'+CUR.wv+'_'+CUR.ss]=true;
  ST.hist.unshift({
    pi:CUR.pi,wv:CUR.wv,ss:CUR.ss,
    date:new Date().toLocaleDateString('uk-UA',{day:'numeric',month:'short'}),
    mW:CUR.mW,done:dn,tot:CUR.wkS.length,
    lbl:PROGS[CUR.pi].sL(CUR.ss)
  });
  if(ST.hist.length>60)ST.hist.pop();save();
  var p=cp();
  if(ST.ss<p.sessions)ST.ss++;
  else if(ST.wv<p.waves){ST.wv++;ST.ss=1;}
  CUR=null;
  renderHome();
  goScr(2);
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHist(){
  var hs=ST.hist.filter(function(h){return h.pi===ST.pi});
  var tot=hs.length;
  var wvs=new Set(hs.map(function(h){return h.wv})).size;
  var mx=hs.reduce(function(m,h){return Math.max(m,h.mW||0)},0);
  var h='<div class="stat-grid">'+
    '<div class="stat"><div class="sv">'+tot+'</div><div class="sl">Тренувань</div></div>'+
    '<div class="stat"><div class="sv">'+wvs+'</div><div class="sl">Хвиль</div></div>'+
    '<div class="stat"><div class="sv">'+(mx||'—')+'</div><div class="sl">Макс. кг</div></div>'+
    '</div>';
  if(!hs.length){
    h+='<div style="text-align:center;padding:40px 16px;color:#888"><div style="font-size:48px">&#128203;</div><p style="margin-top:12px;font-size:15px">Виконай перше тренування</p></div>';
  } else {
    hs.slice(0,20).forEach(function(it){
      var fl=it.done===it.tot;
      h+='<div class="hiitem">'+
        '<div class="hidot '+(fl?'ok':'pt')+'"></div>'+
        '<div style="flex:1">'+
          '<div style="font-size:14px;font-weight:600">'+it.lbl+'</div>'+
          '<div style="font-size:12px;color:#666">'+fw(it.mW)+' · '+it.done+'/'+it.tot+' підходів</div>'+
        '</div>'+
        '<div class="hidate">'+it.date+'</div>'+
        '</div>';
    });
  }
  h+='<button class="btn btn-s" style="margin-top:12px" onclick="clearHist()">Очистити історію</button>';
  ge('hBody').innerHTML=h;
}

function clearHist(){
  if(confirm('Очистити всю історію?')){ST.hist=[];ST.ck={};save();renderHist();renderHome();}
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goScr(i){
  [0,1,2].forEach(function(n){
    ge('s'+n).classList.toggle('on',n===i);
    ge('n'+n).classList.toggle('on',n===i);
  });
  if(i===2)renderHist();
  if(i===1&&CUR)renderTrain();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
