<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Тренування">
<meta name="theme-color" content="#1B3A6B">
<title>Тренування</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F2F4F8;color:#111;padding-bottom:72px}
.hdr{color:#fff;padding:16px;position:sticky;top:0;z-index:10}
.hdr h1{font-size:18px;font-weight:700}
.hdr p{font-size:11px;opacity:.75;margin-top:2px}
.body{padding:14px}
.sec{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
/* PROGRAM CARDS */
.pg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pg{border-radius:14px;padding:12px;border:3px solid transparent;cursor:pointer}
.pg.a{background:#D6E4F7}.pg.b{background:#D4EDE0}.pg.c{background:#F5E0C4}
.pg.sel.a{border-color:#1B3A6B}.pg.sel.b{border-color:#1A5C38}.pg.sel.c{border-color:#7B3F00}
.pg h3{font-size:13px;font-weight:700;margin-bottom:2px}.pg p{font-size:11px;color:#666}
/* CHIPS */
.chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;background:#E0E4EC;color:#555;border:none;cursor:pointer}
.chip.sel{background:#1B3A6B;color:#fff}
.chip.done{background:#D4EDE0;color:#1A5C38}
.chip.sel.done{background:#1A5C38;color:#fff}
/* WEEK VIEW */
.week-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.day-card{border-radius:14px;padding:13px;cursor:pointer;border:2.5px solid transparent;position:relative}
.day-card.bench{background:#D6E4F7}
.day-card.legs{background:#D4EDE0}
.day-card.back{background:#F5E0C4}
.day-card.rest{background:#F0F0F0;cursor:default}
.day-card.done-day{opacity:.7}
.day-card h3{font-size:13px;font-weight:700;margin-bottom:2px}
.day-card p{font-size:11px;color:#555;line-height:1.4}
.day-dot{width:8px;height:8px;border-radius:50%;position:absolute;top:10px;right:10px}
.day-dot.done{background:#1A5C38}
.day-dot.todo{background:#ccc}
/* PREVIEW CARD */
.prev-card{background:#fff;border-radius:14px;padding:14px;margin:10px 0}
.prev-card h2{font-size:14px;font-weight:700;margin-bottom:3px}
.prev-card .sub{font-size:12px;color:#666;margin-bottom:10px}
.nums{display:flex;gap:16px;flex-wrap:wrap}
.nv{font-size:20px;font-weight:800}.nl{font-size:10px;color:#666;margin-top:1px}
/* BUTTONS */
.btn{display:block;width:100%;padding:14px;border-radius:13px;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;text-align:center}
.btn-p{color:#fff}.btn-s{background:#E0E4EC;color:#111}.btn:active{opacity:.8}
/* PROGRESS BAR */
.pbwrap{margin-bottom:14px}
.pblbl{display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:5px}
.pb{height:6px;background:#E0E4EC;border-radius:3px;overflow:hidden}
.pbf{height:100%;border-radius:3px;transition:width .3s}
/* EXERCISE CARDS */
.excard{background:#fff;border-radius:14px;margin-bottom:10px;overflow:hidden}
.exhdr{padding:11px 14px;font-size:14px;font-weight:700;border-bottom:1px solid #E0E4EC;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bdg{font-size:11px;font-weight:600;padding:3px 8px;border-radius:8px}
.bdg-w{background:#FFF3CD;color:#856404}
.bdg-b{background:#D6E4F7;color:#1B3A6B}
.bdg-g{background:#D4EDE0;color:#1A5C38}
.bdg-o{background:#F5E0C4;color:#7B3F00}
/* SET ROWS */
.setrow{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #E0E4EC;gap:10px;min-height:52px}
.setrow:last-child{border-bottom:none}
.setrow.rm{background:#FFFBF0}
.setrow.wk{background:#F5F8FF}
.setrow.ap{background:#F0FBF4}
.setrow.lg{background:#F0FBF4}
.setrow.bk{background:#FDF5EE}
.setrow.done-row{opacity:.4}
.sn{width:20px;font-size:13px;color:#888;font-weight:600;flex-shrink:0}
.st{font-size:12px;color:#888;width:52px;flex-shrink:0}
.sw{font-size:15px;font-weight:700;flex:1}
.sr{font-size:12px;color:#888;flex-shrink:0}
.ckbtn{width:44px;height:44px;min-width:44px;border-radius:50%;border:2.5px solid #ccc;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;-webkit-appearance:none;flex-shrink:0;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.ckbtn.on{background:#1A5C38;border-color:#1A5C38;color:#fff}
/* TIMER */
.tmrbar{color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px;border-radius:12px;background:#1A5C38}
.tmrt{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;flex:1}
.tmrb{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E0E4EC;display:flex;z-index:10}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;gap:2px;font-size:10px;color:#888;border:none;background:none;cursor:pointer}
.nb.on{color:#1B3A6B}.ni{font-size:22px}
/* HISTORY */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:#fff;border-radius:12px;padding:12px;text-align:center}
.sv{font-size:22px;font-weight:800;color:#1B3A6B}.sl{font-size:10px;color:#666;margin-top:2px}
.hiitem{background:#fff;border-radius:12px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.hidot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.hidot.ok{background:#1A5C38}.hidot.pt{background:#FFC107}
.hidate{font-size:11px;color:#888}
.scr{display:none}.scr.on{display:block}
</style>
</head>
<body>

<div id="s0" class="scr on">
  <div class="hdr" style="background:#1B3A6B"><h1>&#128170; Тренування</h1><p id="h0sub">5-сесійна · Хвиля 1</p></div>
  <div class="body">
    <div id="tmr0"></div>
    <div class="sec">Програма</div>
    <div class="pg-grid" id="pgGrid"></div>
    <div class="sec">Хвиля</div>
    <div class="chips" id="wvRow"></div>
    <div class="sec">Тиждень</div>
    <div class="week-grid" id="weekGrid"></div>
    <div id="prevCard"></div>
    <button class="btn btn-p" id="startBtn" onclick="goTrain()">Розпочати &#8594;</button>
  </div>
</div>

<div id="s1" class="scr">
  <div class="hdr" id="tHdr"><h1 id="tTit"></h1><p id="tSub"></p></div>
  <div class="body">
    <div id="tmr1"></div>
    <div id="tBody"></div>
  </div>
</div>

<div id="s2" class="scr">
  <div class="hdr" style="background:#1B3A6B"><h1>&#128202; Прогрес</h1><p>Виконані тренування</p></div>
  <div class="body" id="hBody"></div>
</div>

<nav class="nav">
  <button class="nb on" id="n0" onclick="goScr(0)"><span class="ni">&#127968;</span>Головна</button>
  <button class="nb" id="n1" onclick="goScr(1)"><span class="ni">&#127947;</span>Тренування</button>
  <button class="nb" id="n2" onclick="goScr(2)"><span class="ni">&#128202;</span>Прогрес</button>
</nav>

<script>
// ── UTILS ─────────────────────────────────────────────────────────────────────
function r5(w){return Math.round(w/5)*5}
function fw(w){return w+' кг'}
function ge(id){return document.getElementById(id)}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
var _ac=null;
function initAudio(){if(!_ac)try{_ac=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function beep(){if(!_ac)return;try{[0,.3,.6].forEach(function(d){var o=_ac.createOscillator(),g=_ac.createGain();o.connect(g);g.connect(_ac.destination);o.frequency.value=880;o.type='sine';var t=_ac.currentTime+d;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.4,t+.02);g.gain.linearRampToValueAtTime(0,t+.2);o.start(t);o.stop(t+.2)})}catch(e){}}

// ── TIMER ─────────────────────────────────────────────────────────────────────
var _ti=null,_ts=0;
function timerHTML(){if(!_ti)return '';var m=Math.floor(_ts/60),s=_ts%60;return '<div class="tmrbar"><div class="tmrt">'+m+':'+(s<10?'0':'')+s+'</div><button class="tmrb" onclick="stopTimer()">Готовий &#10003;</button></div>'}
function renderTimers(){var h=timerHTML();['tmr0','tmr1'].forEach(function(id){var el=ge(id);if(el)el.innerHTML=h})}
function startTimer(secs){stopTimer();_ts=secs;_ti=setInterval(function(){_ts--;if(_ts<=0){stopTimer();beep();try{navigator.vibrate&&navigator.vibrate([300,100,300,100,300])}catch(e){}return}renderTimers()},1000);renderTimers()}
function stopTimer(){if(_ti){clearInterval(_ti);_ti=null}renderTimers()}

// ── WARMUP ────────────────────────────────────────────────────────────────────
function wu(t){var s=[{w:20,r:10}];if(t<=60)s.push({w:r5(t*.65),r:6});else if(t<=80){s.push({w:r5(t*.55),r:6});s.push({w:r5(t*.75),r:4})}else if(t<=95){s.push({w:r5(t*.5),r:6});s.push({w:r5(t*.65),r:4});s.push({w:r5(t*.82),r:2})}else{s.push({w:r5(t*.5),r:5});s.push({w:r5(t*.65),r:3});s.push({w:r5(t*.8),r:2});s.push({w:r5(t*.92),r:1})}return s}

// ── BENCH ACCESSORIES ─────────────────────────────────────────────────────────
function benchAcc(pi,wn,sn,mW){
  var b=pi===2?125:100;
  if(sn<=2)return[{n:'Жим похилий',d:fw(r5(b*(.54+(wn-1)*.02)))+' 4x10 · 2хв'},{n:'Тяга в нахилі',d:fw(r5(b*(.30+(wn-1)*.02)))+' 4x10 · 2хв'},{n:'Підйом на біцепс',d:fw(r5(b*.18))+' 3x12 · 90с'}];
  if(sn<=4)return[{n:'Жим вузьким хватом',d:fw(r5(mW*.78))+' 4x8 · 2-3хв'},{n:'Жим стоячи (ОНР)',d:fw(r5(b*(.37+(wn-1)*.015)))+' 3x8 · 2хв'},{n:'Французький жим',d:fw(r5(b*(.22+(wn-1)*.02)))+' 3x12 · 90с'}];
  if(sn<=3)return[{n:'Жим вузьким хватом',d:fw(r5(mW*.78))+' 3x6 · 3хв'},{n:'Підтягування',d:'власна вага 4x6-8 · 2хв'}];
  if(sn===4)return[{n:'Жим вузьким хватом',d:fw(r5(mW*.78))+' 3x4 · 3хв'}];
  return[{n:'Підтягування (легко)',d:'власна вага 4x5 · 2хв'}];
}

// ── LEGS SESSION DATA ─────────────────────────────────────────────────────────
function legsData(wn){
  var sq=80+(wn-1)*5,rdl=80+(wn-1)*5,lc=35+(wn-1)*2.5,ca=40+(wn-1)*2.5;
  return[
    {name:'Гак-присід у тренажері',sets:3,reps:'8–10',weight:sq,rest:150,col:'#1A5C38'},
    {name:'Румунська тяга (Сміт)',sets:3,reps:'12–15',weight:rdl,rest:120,col:'#1A5C38'},
    {name:'Згинання ніг лежачи',sets:3,reps:12,weight:lc,rest:90,col:'#1A5C38'},
    {name:'Підйом на носки',sets:3,reps:15,weight:ca,rest:60,col:'#1A5C38'},
  ];
}

// ── BACK SESSION DATA ─────────────────────────────────────────────────────────
function backData(wn){
  var pd=80+(wn-1)*5,row=70+(wn-1)*5,face=15,bic=25+(wn-1)*2.5;
  return[
    {name:'Тяга верхнього блоку (Lat Pulldown)',sets:3,reps:'8–10',weight:pd,rest:150,col:'#7B3F00'},
    {name:'Горизонтальний блок (Seated Row)',sets:3,reps:'8–10',weight:row,rest:150,col:'#7B3F00'},
    {name:'Face Pull (задня дельта)',sets:3,reps:15,weight:face,rest:60,col:'#7B3F00'},
    {name:'Підйом на біцепс',sets:3,reps:10,weight:bic,rest:90,col:'#7B3F00'},
  ];
}

// ── PROGRAM DATA ──────────────────────────────────────────────────────────────
var P5B=[100,105,110,115,120,125];
var P5D=[
  {pct:.60,sets:4,reps:10,rest:180,lbl:"Об'єм (60%)",aps:false},
  {pct:.70,sets:5,reps:8,rest:180,lbl:"Гіпертрофія (70%)",aps:false},
  {pct:.80,sets:6,reps:6,rest:210,lbl:"Сила-об'єм (80%)",aps:false},
  {pct:.90,sets:5,reps:4,rest:270,lbl:"Сила (90%)",aps:true},
  {pct:1.0,sets:0,reps:2,rest:330,lbl:"Пік (100%)",aps:true}
];
function p5sets(wn){return wn<=2?3:wn<=4?4:5}
var P9A=[100,105,110,115],P9B=[125,130,135,140];
var P9D=[
  {sets:3,reps:10,rest:150,lbl:"Об'єм (60%)",aps:false},
  {sets:4,reps:10,rest:150,lbl:"Об'єм (65%)",aps:false},
  {sets:4,reps:8,rest:180,lbl:"Гіпертрофія (70%)",aps:false},
  {sets:5,reps:8,rest:180,lbl:"Гіпертрофія+ (75%)",aps:false},
  {sets:5,reps:6,rest:210,lbl:"Сила-об'єм (80%)",aps:false},
  {sets:6,reps:6,rest:210,lbl:"Сила-вит. (85%)",aps:false},
  {sets:5,reps:4,rest:270,lbl:"Сила (90%)",aps:true},
  {sets:4,reps:4,rest:300,lbl:"Сила+ (95%)",aps:true},
  {sets:0,reps:2,rest:330,lbl:"Пік (100%)",aps:true}
];
function p9sets(wn){return wn===1?3:wn<=3?4:5}

var PROGS=[
  {name:'5-сесійна',sub:'ПМ 100 кг',cls:'a',col:'#1B3A6B',waves:6,sessions:5,hasWeek:true,
   gW:function(wn,sn){return r5(P5B[wn-1]*P5D[sn-1].pct)},
   gD:function(sn){return P5D[sn-1]},
   gS:function(wn,sn){return sn===5?p5sets(wn):P5D[sn-1].sets},
   wL:function(wn){return 'Хвиля '+wn+' · '+P5B[wn-1]+' кг'},
   sL:function(sn){return 'С'+sn+': '+P5D[sn-1].lbl}},
  {name:'9-сесійна А',sub:'ПМ 100 кг',cls:'b',col:'#1A5C38',waves:4,sessions:9,hasWeek:false,
   gW:function(wn,sn){return P9A[wn-1]-(9-sn)*5},
   gD:function(sn){return P9D[sn-1]},
   gS:function(wn,sn){return sn===9?p9sets(wn):P9D[sn-1].sets},
   wL:function(wn){return 'Хвиля '+wn+' · '+P9A[wn-1]+' кг'},
   sL:function(sn){return 'Т'+sn+': '+P9D[sn-1].lbl}},
  {name:'9-сесійна Б',sub:'ПМ 125 кг',cls:'c',col:'#7B3F00',waves:4,sessions:9,hasWeek:false,
   gW:function(wn,sn){return P9B[wn-1]-(9-sn)*5},
   gD:function(sn){return P9D[sn-1]},
   gS:function(wn,sn){return sn===9?p9sets(wn):P9D[sn-1].sets},
   wL:function(wn){return 'Хвиля '+wn+' · '+P9B[wn-1]+' кг'},
   sL:function(sn){return 'Т'+sn+': '+P9D[sn-1].lbl}}
];

// ── STATE ─────────────────────────────────────────────────────────────────────
var ST={pi:0,wv:1,ss:1,day:'bench',ck:{},hist:[]};
try{var _sv=localStorage.getItem('bench_v2');if(_sv){var _d=JSON.parse(_sv);ST=Object.assign(ST,_d)}}catch(e){}
function save(){try{localStorage.setItem('bench_v2',JSON.stringify(ST))}catch(e){}}
var CUR=null;

function cp(){return PROGS[ST.pi]}
function isDone(w,s){return !!ST.ck[ST.pi+'_'+w+'_'+s]}
function isDoneDay(type,wn){return !!ST.ck[ST.pi+'_'+type+'_'+wn]}
function isWaveDone(w){var p=cp();for(var i=1;i<=p.sessions;i++)if(!isDone(w,i))return false;return true}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome(){
  var p=cp();
  ge('h0sub').textContent=p.name+' · Хвиля '+ST.wv;
  ge('startBtn').style.background=p.col;
  renderPG();renderWV();
  if(p.hasWeek)renderWeek();
  else renderSS();
  renderPrev();
}

function renderPG(){
  var h='';
  PROGS.forEach(function(p,i){
    h+='<div class="pg '+p.cls+(ST.pi===i?' sel':'')+'" onclick="selProg('+i+')"><h3>'+p.name+'</h3><p>'+p.sub+'</p></div>';
  });
  ge('pgGrid').innerHTML=h;
}

function renderWV(){
  var p=cp(),h='';
  for(var w=1;w<=p.waves;w++){
    var wd=isWaveDone(w);
    h+='<button class="chip'+(ST.wv===w?' sel':'')+(wd?' done':'')+'" onclick="selWave('+w+')">'+(wd?'&#10003; ':'')+'Хв.'+w+'</button>';
  }
  ge('wvRow').innerHTML=h;
}

function renderWeek(){
  var wn=ST.wv,p=PROGS[ST.pi];
  // 3 sub-weeks per wave:
  // Тиждень А: Вт С1 + Ср Ноги + Пт С2 + Сб Спина
  // Тиждень Б: Вт С3 + Ср Ноги + Пт С4 + Сб Спина
  // Тиждень В: Вт С5 + Ср Ноги(легко) + Пт Відпочинок + Сб Спина(легко)
  var weeks=[
    {lbl:'Тиждень А',s1:1,s2:2,legs:'legs_a',back:'back_a'},
    {lbl:'Тиждень Б',s1:3,s2:4,legs:'legs_b',back:'back_b'},
    {lbl:'Тиждень В',s1:5,s2:null,legs:'legs_c',back:'back_c'},
  ];
  var h='';
  weeks.forEach(function(wk,wi){
    var wkLabel=wk.lbl;
    h+='<div style="grid-column:1/-1;margin-top:'+(wi>0?'14px':'2px')+';margin-bottom:4px">'+
      '<div style="font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px">'+wkLabel+'</div></div>';

    // Вівторок — жим (s1)
    var s1done=isDone(wn,wk.s1);
    var s1sel=(ST.day==='bench'&&ST.ss===wk.s1)||(ST.day==='bench2'&&ST.ss===wk.s1);
    h+=dayCard('bench','Вівторок','Жим · '+p.sL(wk.s1),s1done,s1sel,'bench',wk.s1);

    // Середа — ноги
    var legsDoneKey=ST.pi+'_legs_w'+wn+'_'+wi;
    var legsDone=!!ST.ck[legsDoneKey];
    var legsSel=ST.day===('legs_'+['a','b','c'][wi]);
    h+=dayCard('legs','Середа',wi===2?'Ноги (легко)':'День ніг',legsDone,legsSel,'legs_'+['a','b','c'][wi],null);

    // П'ятниця — жим (s2) або відпочинок
    if(wk.s2){
      var s2done=isDone(wn,wk.s2);
      var s2sel=(ST.day==='bench'&&ST.ss===wk.s2)||(ST.day==='bench2'&&ST.ss===wk.s2);
      h+=dayCard('bench','П\'ятниця','Жим · '+p.sL(wk.s2),s2done,s2sel,'bench2',wk.s2);
    } else {
      h+='<div class="day-card rest"><h3>П\'ятниця</h3><p>Відпочинок</p></div>';
    }

    // Субота — спина
    var backDoneKey=ST.pi+'_back_w'+wn+'_'+wi;
    var backDone=!!ST.ck[backDoneKey];
    var backSel=ST.day===('back_'+['a','b','c'][wi]);
    h+=dayCard('back','Субота',wi===2?'Спина (легко)':'День спини',backDone,backSel,'back_'+['a','b','c'][wi],null);
  });
  ge('weekGrid').innerHTML=h;
}

function dayCard(cls,label,sub,done,sel,dayId,sn){
  var borderCol=sel?'#1B3A6B':'transparent';
  return '<div class="day-card '+cls+(done?' done-day':'')+'" onclick="selDay(\''+dayId+'\','+(sn||'null')+')" style="border-color:'+borderCol+'">'+
    '<div class="day-dot '+(done?'done':'todo')+'"></div>'+
    '<h3>'+label+'</h3>'+
    '<p>'+sub+(done?'<br><span style="color:#1A5C38;font-weight:700;font-size:10px">&#10003; Виконано</span>':'')+'</p>'+
    '</div>';
}

function renderSS(){
  var p=cp(),h='';
  for(var s=1;s<=p.sessions;s++){
    var lb='Т'+s,wd=isDone(ST.wv,s);
    h+='<button class="chip'+(ST.ss===s?' sel':'')+(wd?' done':'')+'" onclick="selSess('+s+')">'+(wd?'&#10003; ':'')+lb+'</button>';
  }
  ge('weekGrid').innerHTML='<div style="grid-column:1/-1"><div class="chips" style="flex-wrap:nowrap">'+h+'</div></div>';
}

function renderPrev(){
  var p=cp();
  var col=p.col;
  var h='';
  if(p.hasWeek){
    if(ST.day.indexOf('legs')===0){
      var ld=legsData(ST.wv);
      h='<div class="prev-card" style="border-left:4px solid #1A5C38">'+
        '<h2>&#127939; День ніг — Хвиля '+ST.wv+'</h2>'+
        '<div class="sub">Гак-присід · RDL · Згинання · Ікри</div>'+
        '<div class="nums">'+
        '<div><div class="nv" style="color:#1A5C38">'+fw(ld[0].weight)+'</div><div class="nl">Гак-присід</div></div>'+
        '<div><div class="nv" style="color:#1A5C38">'+fw(ld[1].weight)+'</div><div class="nl">RDL</div></div>'+
        '</div></div>';
      col='#1A5C38';
    } else if(ST.day.indexOf('back')===0){
      var bd=backData(ST.wv);
      h='<div class="prev-card" style="border-left:4px solid #7B3F00">'+
        '<h2>&#128170; День спини — Хвиля '+ST.wv+'</h2>'+
        '<div class="sub">Lat Pulldown · Seated Row · Face Pull · Біцепс</div>'+
        '<div class="nums">'+
        '<div><div class="nv" style="color:#7B3F00">'+fw(bd[0].weight)+'</div><div class="nl">Pulldown</div></div>'+
        '<div><div class="nv" style="color:#7B3F00">'+fw(bd[1].weight)+'</div><div class="nl">Row</div></div>'+
        '</div></div>';
      col='#7B3F00';
    } else {
      var sn=ST.ss,mW=p.gW(ST.wv,sn),sets=p.gS(ST.wv,sn),def=p.gD(sn);
      var pct=Math.round(def.pct*100),d=isDone(ST.wv,sn);
      h='<div class="prev-card" style="border-left:4px solid '+col+'">'+
        '<h2>'+p.sL(sn)+'</h2><div class="sub">'+p.wL(ST.wv)+'</div>'+
        '<div class="nums">'+
        '<div><div class="nv" style="color:'+col+'">'+fw(mW)+'</div><div class="nl">Вага</div></div>'+
        '<div><div class="nv" style="color:'+col+'">'+sets+'&#215;'+def.reps+'</div><div class="nl">Підх&#215;Повт</div></div>'+
        '<div><div class="nv" style="color:'+col+'">'+pct+'%</div><div class="nl">Від ПМ</div></div>'+
        '</div>'+(d?'<div style="margin-top:8px;font-size:13px;color:#1A5C38;font-weight:700">&#10003; Виконано</div>':'')+
        '</div>';
    }
  } else {
    var sn=ST.ss,mW=p.gW(ST.wv,sn),sets=p.gS(ST.wv,sn),def=p.gD(sn);
    var pct=Math.round(def.pct*100),d=isDone(ST.wv,sn);
    h='<div class="prev-card" style="border-left:4px solid '+col+'">'+
      '<h2>'+p.sL(sn)+'</h2><div class="sub">'+p.wL(ST.wv)+'</div>'+
      '<div class="nums">'+
      '<div><div class="nv" style="color:'+col+'">'+fw(mW)+'</div><div class="nl">Вага</div></div>'+
      '<div><div class="nv" style="color:'+col+'">'+sets+'&#215;'+def.reps+'</div><div class="nl">Підх&#215;Повт</div></div>'+
      '<div><div class="nv" style="color:'+col+'">'+pct+'%</div><div class="nl">Від ПМ</div></div>'+
      '</div>'+(d?'<div style="margin-top:8px;font-size:13px;color:#1A5C38;font-weight:700">&#10003; Виконано</div>':'')+
      '</div>';
  }
  ge('prevCard').innerHTML=h;
  ge('startBtn').style.background=col;
}

function selProg(i){ST.pi=i;ST.wv=1;ST.ss=1;ST.day='bench';save();renderHome()}
function selWave(w){ST.wv=w;ST.ss=1;ST.day='bench';save();renderHome()}
function selSess(s){ST.ss=s;save();renderSS();renderPrev()}
function selDay(id,sn){
  ST.day=id;
  if(sn)ST.ss=sn;
  save();
  if(cp().hasWeek){renderWeek();renderPrev();}
}

// ── TRAINING ──────────────────────────────────────────────────────────────────
function goTrain(){
  initAudio();
  var p=cp();
  if(p.hasWeek&&ST.day.indexOf('legs')===0){CUR={type:'legs',dayId:ST.day,wv:ST.wv,exC:[]};var ld=legsData(ST.wv);for(var i=0;i<ld.length;i++)CUR.exC.push(new Array(ld[i].sets).fill(false))}
  else if(p.hasWeek&&ST.day.indexOf('back')===0){CUR={type:'back',dayId:ST.day,wv:ST.wv,exC:[]};var bd=backData(ST.wv);for(var i=0;i<bd.length;i++)CUR.exC.push(new Array(bd[i].sets).fill(false))}
  else{
    var sn=ST.ss,mW=p.gW(ST.wv,sn),sets=p.gS(ST.wv,sn),def=p.gD(sn);
    var wuS=wu(mW),wkS=[];
    for(var i=0;i<sets;i++)wkS.push({w:mW,r:def.reps});
    CUR={type:'bench',pi:ST.pi,wv:ST.wv,ss:sn,mW:mW,def:def,wuS:wuS,wkS:wkS,aw:15,wuC:[],wkC:[],apC:[]};
    var px='c'+CUR.pi+'_'+CUR.wv+'_'+CUR.ss+'_';
    for(var i=0;i<wuS.length;i++)CUR.wuC.push(!!ST.ck[px+'u'+i]);
    for(var i=0;i<wkS.length;i++)CUR.wkC.push(!!ST.ck[px+'k'+i]);
    for(var i=0;i<wkS.length;i++)CUR.apC.push(!!ST.ck[px+'a'+i]);
  }
  renderTrain();goScr(1);
}

function renderTrain(){
  if(!CUR)return;
  if(CUR.type==='legs')renderLegsOrBack('legs');
  else if(CUR.type==='back')renderLegsOrBack('back');
  else renderBench();
}

function renderLegsOrBack(type){
  var isLegs=type==='legs';
  var data=isLegs?legsData(CUR.wv):backData(CUR.wv);
  var col=isLegs?'#1A5C38':'#7B3F00';
  var title=isLegs?'&#127939; День ніг':'&#128170; День спини';
  var cls=isLegs?'lg':'bk';
  ge('tTit').innerHTML=title;
  ge('tSub').textContent='Хвиля '+CUR.wv;
  ge('tHdr').style.background=col;

  var totalSets=data.reduce(function(s,e){return s+e.sets},0);
  var doneSets=0;
  data.forEach(function(e,ei){CUR.exC[ei].forEach(function(v){if(v)doneSets++})});
  var pct=totalSets?Math.round(doneSets/totalSets*100):0;

  var h='<div class="pbwrap"><div class="pblbl"><span>Підходи</span><span>'+doneSets+'/'+totalSets+'</span></div><div class="pb"><div class="pbf" style="width:'+pct+'%;background:'+col+'"></div></div></div>';

  data.forEach(function(ex,ei){
    h+='<div class="excard"><div class="exhdr">'+ex.name+' <span class="bdg '+(isLegs?'bdg-g':'bdg-o')+'">'+ex.sets+'&#215;'+ex.reps+' @ '+fw(ex.weight)+'</span></div>';
    for(var si=0;si<ex.sets;si++){
      var c=CUR.exC[ei][si];
      h+='<div class="setrow '+cls+(c?' done-row':'')+'">'+
        '<span class="sn">'+(si+1)+'</span>'+
        '<span class="st" style="color:'+col+';font-weight:700">Роб.</span>'+
        '<span class="sw" style="color:'+col+'">'+fw(ex.weight)+'</span>'+
        '<span class="sr">'+ex.reps+' пов.</span>'+
        '<button class="ckbtn'+(c?' on':'')+'" onclick="toggleAux('+ei+','+si+','+ex.rest+')">'+(c?'&#10003;':'')+'</button></div>';
    }
    h+='</div>';
  });

  h+='<button class="btn btn-p" style="background:'+col+'" onclick="finAux(\''+type+'\')">Завершити &#10003;</button>';
  h+='<button class="btn btn-s" onclick="goScr(0)">&#8592; Назад</button>';
  ge('tBody').innerHTML=h;
}

function renderBench(){
  var p=PROGS[CUR.pi],def=CUR.def,col=p.col;
  ge('tTit').textContent='С'+CUR.ss+' — '+def.lbl;
  ge('tSub').textContent=p.wL(CUR.wv)+' · '+fw(CUR.mW);
  ge('tHdr').style.background=col;

  var dn=CUR.wkC.filter(function(v){return v}).length,tot=CUR.wkS.length;
  var pct=tot?Math.round(dn/tot*100):0;
  var h='<div class="pbwrap"><div class="pblbl"><span>Робочі підходи</span><span>'+dn+'/'+tot+'</span></div><div class="pb"><div class="pbf" style="width:'+pct+'%;background:'+col+'"></div></div></div>';

  h+='<div class="excard"><div class="exhdr">Розминка <span class="bdg bdg-w">'+CUR.wuS.length+' підх. · 60с</span></div>';
  CUR.wuS.forEach(function(s,i){var c=CUR.wuC[i];
    h+='<div class="setrow rm'+(c?' done-row':'')+'"><span class="sn">'+(i+1)+'</span><span class="st" style="color:#856404">Розм.</span><span class="sw">'+fw(s.w)+'</span><span class="sr">'+s.r+' пов.</span><button class="ckbtn'+(c?' on':'')+'" onclick="toggle(\'wu\','+i+',60)">'+(c?'&#10003;':'')+'</button></div>';
  });
  h+='</div>';

  var rm=Math.floor(def.rest/60);
  if(def.aps){
    h+='<div class="excard"><div class="exhdr">Жим лежачи <span class="bdg bdg-b">'+tot+'&#215;'+def.reps+' @ '+fw(CUR.mW)+'</span></div>';
    h+='<div style="background:#F0FBF4;margin:0 12px 12px;border-radius:10px;padding:10px">';
    h+='<div style="font-size:12px;font-weight:700;color:#1A5C38;margin-bottom:8px">APS — Row/Pulldown @ '+fw(CUR.aw)+'</div>';
    CUR.wkS.forEach(function(s,i){var ck=CUR.wkC[i],ca=CUR.apC[i];
      h+='<div class="setrow wk'+(ck?' done-row':'')+'" style="border-radius:8px;margin-bottom:4px;border:none"><span class="sn">'+(i+1)+'</span><span class="st" style="color:'+col+';font-weight:700">Жим</span><span class="sw" style="color:'+col+'">'+fw(s.w)+'</span><span class="sr">'+s.r+' пов.</span><button class="ckbtn'+(ck?' on':'')+'" onclick="toggle(\'wk\','+i+','+def.rest+')">'+(ck?'&#10003;':'')+'</button></div>';
      if(i<CUR.wkS.length-1)h+='<div class="setrow ap'+(ca?' done-row':'')+'" style="border-radius:8px;margin-bottom:4px;border:none;background:#E8F5E9"><span class="sn">&nbsp;</span><span class="st" style="color:#1A5C38">APS</span><span class="sw" style="color:#1A5C38">'+fw(CUR.aw)+'</span><span class="sr">6-8 пов.</span><button class="ckbtn'+(ca?' on':'')+'" onclick="toggle(\'ap\','+i+',90)">'+(ca?'&#10003;':'')+'</button></div>';
    });
    h+='</div></div>';
  } else {
    h+='<div class="excard"><div class="exhdr">Жим лежачи <span class="bdg bdg-b">'+tot+'&#215;'+def.reps+' @ '+fw(CUR.mW)+'</span> <span class="bdg" style="background:#eee;color:#555">'+rm+'хв</span></div>';
    CUR.wkS.forEach(function(s,i){var c=CUR.wkC[i];
      h+='<div class="setrow wk'+(c?' done-row':'')+'"><span class="sn">'+(i+1)+'</span><span class="st" style="color:'+col+';font-weight:700">Роб.</span><span class="sw" style="color:'+col+'">'+fw(s.w)+'</span><span class="sr">'+s.r+' пов.</span><button class="ckbtn'+(c?' on':'')+'" onclick="toggle(\'wk\','+i+','+def.rest+')">'+(c?'&#10003;':'')+'</button></div>';
    });
    h+='</div>';
  }

  var ax=benchAcc(CUR.pi,CUR.wv,CUR.ss,CUR.mW);
  if(ax.length){h+='<div class="excard" style="border:1px solid #E0E4EC"><div class="exhdr" style="background:#F8F9FC">Допоміжні вправи</div>';ax.forEach(function(a){h+='<div style="padding:10px 14px;border-bottom:1px solid #E0E4EC;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:600">'+a.n+'</span><span style="font-size:12px;color:#666;text-align:right">'+a.d+'</span></div>'});h+='</div>'}

  h+='<button class="btn btn-p" style="background:'+col+'" onclick="finBench()">Завершити &#10003;</button>';
  h+='<button class="btn btn-s" onclick="goScr(0)">&#8592; Назад</button>';
  ge('tBody').innerHTML=h;
}

function toggle(type,idx,rest){
  if(!CUR||CUR.type!=='bench')return;
  var px='c'+CUR.pi+'_'+CUR.wv+'_'+CUR.ss+'_';
  var wasOn;
  if(type==='wu'){wasOn=CUR.wuC[idx];CUR.wuC[idx]=!wasOn;ST.ck[px+'u'+idx]=CUR.wuC[idx]}
  else if(type==='wk'){wasOn=CUR.wkC[idx];CUR.wkC[idx]=!wasOn;ST.ck[px+'k'+idx]=CUR.wkC[idx]}
  else if(type==='ap'){wasOn=CUR.apC[idx];CUR.apC[idx]=!wasOn;ST.ck[px+'a'+idx]=CUR.apC[idx]}
  if(!wasOn)startTimer(rest);save();renderBench();
}

function toggleAux(ei,si,rest){
  if(!CUR)return;
  var wasOn=CUR.exC[ei][si];
  CUR.exC[ei][si]=!wasOn;
  if(!wasOn)startTimer(rest);
  renderLegsOrBack(CUR.type);
}

function finBench(){
  if(!CUR)return;
  var dn=CUR.wkC.filter(function(v){return v}).length;
  ST.ck[CUR.pi+'_'+CUR.wv+'_'+CUR.ss]=true;
  ST.hist.unshift({pi:CUR.pi,wv:CUR.wv,ss:CUR.ss,type:'bench',date:new Date().toLocaleDateString('uk-UA',{day:'numeric',month:'short'}),mW:CUR.mW,done:dn,tot:CUR.wkS.length,lbl:PROGS[CUR.pi].sL(CUR.ss)});
  if(ST.hist.length>60)ST.hist.pop();
  var p=cp();
  if(ST.ss<p.sessions)ST.ss++;else if(ST.wv<p.waves){ST.wv++;ST.ss=1;}
  // After bench, next day is legs of current sub-week
  var wkIdx=CUR.ss<=2?0:CUR.ss<=4?1:2;
  ST.day='legs_'+['a','b','c'][wkIdx];CUR=null;save();renderHome();goScr(2);
}

function finAux(type){
  var dayId=CUR.dayId;
  var wn=CUR.wv;
  // Save done state with unique key per week
  var wi=['a','b','c'].indexOf(dayId.slice(-1));
  ST.ck[ST.pi+'_'+type+'_w'+wn+'_'+wi]=true;
  var label=type==='legs'?'День ніг':'День спини';
  ST.hist.unshift({pi:ST.pi,wv:wn,type:type,date:new Date().toLocaleDateString('uk-UA',{day:'numeric',month:'short'}),lbl:label,done:1,tot:1,mW:0});
  if(ST.hist.length>60)ST.hist.pop();
  // Auto-advance day
  var nextMap={'legs_a':'bench2','legs_b':'bench2','legs_c':'bench2','back_a':'bench','back_b':'bench','back_c':'bench'};
  ST.day=nextMap[dayId]||'bench';
  CUR=null;save();renderHome();goScr(2);
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHist(){
  var hs=ST.hist.filter(function(h){return h.pi===ST.pi});
  var tot=hs.length,wvs=new Set(hs.map(function(h){return h.wv})).size;
  var mx=hs.filter(function(h){return h.type==='bench'}).reduce(function(m,h){return Math.max(m,h.mW||0)},0);
  var h='<div class="stat-grid"><div class="stat"><div class="sv">'+tot+'</div><div class="sl">Тренувань</div></div><div class="stat"><div class="sv">'+wvs+'</div><div class="sl">Хвиль</div></div><div class="stat"><div class="sv">'+(mx||'—')+'</div><div class="sl">Макс. кг</div></div></div>';
  if(!hs.length){h+='<div style="text-align:center;padding:40px 16px;color:#888"><div style="font-size:48px">&#128203;</div><p style="margin-top:12px;font-size:15px">Виконай перше тренування</p></div>'}
  else hs.slice(0,25).forEach(function(it){
    var ic=it.type==='legs'?'&#127939;':it.type==='back'?'&#128170;':'&#127947;';
    h+='<div class="hiitem"><div class="hidot ok"></div><div style="flex:1"><div style="font-size:14px;font-weight:600">'+ic+' '+it.lbl+'</div>'+(it.mW?'<div style="font-size:12px;color:#666">'+fw(it.mW)+' · '+it.done+'/'+it.tot+' підх.</div>':'')+'</div><div class="hidate">'+it.date+'</div></div>';
  });
  h+='<button class="btn btn-s" style="margin-top:12px" onclick="clearHist()">Очистити</button>';
  ge('hBody').innerHTML=h;
}
function clearHist(){if(confirm('Очистити всю історію?')){ST.hist=[];ST.ck={};save();renderHist();renderHome()}}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goScr(i){[0,1,2].forEach(function(n){ge('s'+n).classList.toggle('on',n===i);ge('n'+n).classList.toggle('on',n===i)});if(i===2)renderHist();if(i===1&&CUR)renderTrain()}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
